<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TapDay X</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<style>
body{
    margin:0;
    background:#0f0f1a;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow:hidden;
}

#score{
    font-size:40px;
    margin-top:20px;
}

#tapBtn{
    margin-top:50px;
    width:200px;
    height:200px;
    border-radius:50%;
    border:none;
    font-size:30px;
    background:linear-gradient(45deg,#ff00cc,#3333ff);
    color:white;
    cursor:pointer;
    transition:0.1s;
}

#tapBtn:active{
    transform:scale(0.9);
}

#leaderboard{
    position:absolute;
    right:10px;
    top:10px;
    width:200px;
    background:#1a1a2e;
    padding:10px;
    border-radius:10px;
}

.popup{
    position:absolute;
    font-size:30px;
    animation:float 1s forwards;
}

@keyframes float{
    0%{opacity:1; transform:translateY(0);}
    100%{opacity:0; transform:translateY(-100px);}
}

.particle{
    position:absolute;
    width:5px;
    height:5px;
    background:gold;
    border-radius:50%;
    animation:particle 1s forwards;
}

@keyframes particle{
    to{
        transform:translate(var(--x),var(--y));
        opacity:0;
    }
}
</style>
</head>
<body>

<div id="score">0</div>
<button id="tapBtn">TAP</button>

<div id="leaderboard">
<h3>TOP 3</h3>
<div id="topList"></div>
</div>

<audio id="tapSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>
<audio id="bonusSound" src="https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-2065.mp3"></audio>
<audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-arcade-game-opener-222.mp3" loop></audio>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let score = 0;
let username = "user_" + Math.floor(Math.random()*9999);

const scoreEl = document.getElementById("score");
const tapBtn = document.getElementById("tapBtn");
const tapSound = document.getElementById("tapSound");
const bonusSound = document.getElementById("bonusSound");
const bgMusic = document.getElementById("bgMusic");

bgMusic.volume = 0.3;
bgMusic.play();

tapBtn.onclick = async () => {

    let multiplier = Math.random() < 0.1 ? 5 : 1;
    score += multiplier;

    if(multiplier > 1){
        bonusSound.play();
        showPopup("x5 BONUS!");
    }

    tapSound.play();
    scoreEl.innerText = score;

    createParticles();

    await setDoc(doc(db,"players",username),{
        score:score
    });

    updateLeaderboard();
};

function showPopup(text){
    let el = document.createElement("div");
    el.className="popup";
    el.innerText=text;
    el.style.left="50%";
    el.style.top="40%";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1000);
}

function createParticles(){
    for(let i=0;i<10;i++){
        let p = document.createElement("div");
        p.className="particle";
        p.style.left="50%";
        p.style.top="50%";
        p.style.setProperty("--x",(Math.random()*200-100)+"px");
        p.style.setProperty("--y",(Math.random()*200-100)+"px");
        document.body.appendChild(p);
        setTimeout(()=>p.remove(),1000);
    }
}

async function updateLeaderboard(){
    const querySnapshot = await getDocs(collection(db,"players"));
    let arr=[];
    querySnapshot.forEach(doc=>{
        arr.push({name:doc.id,score:doc.data().score});
    });

    arr.sort((a,b)=>b.score-a.score);

    let html="";
    for(let i=0;i<3;i++){
        if(arr[i]){
            html += `<div>${i+1}. ${arr[i].name} - ${arr[i].score}</div>`;
        }
    }

    document.getElementById("topList").innerHTML=html;
}

setInterval(updateLeaderboard,5000);

</script>
</body>
</html>
