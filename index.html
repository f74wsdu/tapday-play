<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapDay Online</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#1f1c2c,#928dab);
    color:white;
    text-align:center;
}
h1{margin-top:20px;}
#tapBtn{
    width:200px;
    height:200px;
    border-radius:50%;
    border:none;
    font-size:28px;
    background:cyan;
    box-shadow:0 0 30px cyan;
}
#tapBtn:active{transform:scale(0.9);}
.panel{margin-top:20px;}
.leaderboard{
    margin-top:20px;
    background:rgba(0,0,0,0.3);
    padding:10px;
    border-radius:10px;
}
button{margin:5px;padding:8px;}
</style>
</head>
<body>

<h1>🔥 TapDay SEASON 1 🔥</h1>

<div id="userName">Connecting...</div>
<div>Coins: <span id="coins">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>Battle Pass: <span id="battleXP">0</span>/100</div>

<button id="tapBtn">TAP</button>

<div class="panel">
    <button onclick="watchAd()">Reward Ad</button>
    <button onclick="requestWithdraw()">Withdraw</button>
</div>

<div class="leaderboard">
<h3>🏆 Leaderboard</h3>
<div id="leaderboard"></div>
</div>

<script type="module">

// =======================
// FIREBASE CONFIG (ЗАМІНИ НА СВОЄ)
// =======================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// =======================
// TELEGRAM LOGIN
// =======================

let tg = window.Telegram.WebApp;
tg.expand();

let username = tg.initDataUnsafe?.user?.username || "Guest_"+Math.floor(Math.random()*9999);
document.getElementById("userName").innerText = "👤 "+username;

// =======================
// PLAYER DATA
// =======================

let player = {
    coins:0,
    level:1,
    battleXP:0
};

async function loadPlayer(){
    const snap = await getDoc(doc(db,"players",username));
    if(snap.exists()){
        player = snap.data();
    }
    updateUI();
}

async function savePlayer(){
    await setDoc(doc(db,"players",username),player);
}

// =======================
// TAP SYSTEM
// =======================

document.getElementById("tapBtn").onclick = async function(){

    player.coins+=1;
    player.battleXP+=1;

    if(player.battleXP>=100){
        player.coins+=500;
        player.battleXP=0;
        alert("🎟 Battle Pass Level Up!");
    }

    if(player.coins%100===0){
        player.level++;
    }

    updateUI();
    await savePlayer();
    loadLeaderboard();
};

// =======================
// LEADERBOARD
// =======================

async function loadLeaderboard(){
    const q = query(collection(db,"players"), orderBy("coins","desc"), limit(10));
    const querySnapshot = await getDocs(q);

    let html="";
    querySnapshot.forEach(doc=>{
        html += `<div>${doc.id} - ${doc.data().coins} coins</div>`;
    });

    document.getElementById("leaderboard").innerHTML = html;
}

// =======================
// REWARD AD (заготовка)
// =======================

function watchAd(){
    alert("Watching Ad...");
    setTimeout(()=>{
        player.coins+=200;
        updateUI();
        savePlayer();
    },3000);
}

// =======================
// WITHDRAW REQUEST
// =======================

async function requestWithdraw(){
    if(player.coins>=1000){
        player.coins-=1000;
        await setDoc(doc(db,"withdraws",username+"_"+Date.now()),{
            user:username,
            amount:1000,
            status:"pending"
        });
        alert("Withdraw request sent!");
        savePlayer();
    }else{
        alert("Not enough coins");
    }
}

// =======================
// UI
// =======================

function updateUI(){
    document.getElementById("coins").innerText=player.coins;
    document.getElementById("level").innerText=player.level;
    document.getElementById("battleXP").innerText=player.battleXP;
}

// =======================
// START
// =======================

await signInAnonymously(auth);
await loadPlayer();
loadLeaderboard();

</script>

</body>
</html>
