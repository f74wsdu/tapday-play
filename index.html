<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapDay Ultra</title>
<style>
body{
    margin:0;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    font-family:Arial;
    text-align:center;
}
h1{margin-top:20px;}
#tapBtn{
    width:200px;
    height:200px;
    border-radius:50%;
    font-size:28px;
    border:none;
    background:cyan;
    color:black;
    margin-top:30px;
    box-shadow:0 0 30px cyan;
    transition:0.1s;
}
#tapBtn:active{transform:scale(0.9);}
.panel{
    margin-top:20px;
}
button{
    margin:5px;
    padding:10px;
}
</style>
</head>
<body>

<h1>🔥 TapDay ULTRA 🔥</h1>

<div>Coins: <span id="coins">0</span></div>
<div>Level: <span id="level">1</span></div>
<div>XP: <span id="xp">0</span></div>
<div>Prestige: <span id="prestige">0</span></div>

<button id="tapBtn">TAP</button>

<div class="panel">
    <button onclick="activatePrestige()">Prestige</button>
    <button onclick="startPvP()">PvP</button>
    <button onclick="watchAd()">Watch Ad</button>
</div>

<div class="panel">
    <button onclick="buySkin('gold')">Gold Skin</button>
    <button onclick="buySkin('galaxy')">Galaxy Skin</button>
</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_5b3d1df9c5.mp3">
</audio>

<audio id="tapSound">
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8b3a.mp3">
</audio>

<script>

// ==========================
// PLAYER DATA
// ==========================

let player = JSON.parse(localStorage.getItem("tapday")) || {
    coins:0,
    level:1,
    xp:0,
    prestige:0,
    skin:"default",
    missions:{tap:0},
    battleXP:0,
    antiCheat:0
};

let tapCounter = 0;
let maxTap = 20;

setInterval(()=>{tapCounter=0;},1000);

// ==========================
// UI UPDATE
// ==========================

function updateUI(){
    document.getElementById("coins").innerText=player.coins;
    document.getElementById("level").innerText=player.level;
    document.getElementById("xp").innerText=player.xp;
    document.getElementById("prestige").innerText=player.prestige;
}

function save(){
    localStorage.setItem("tapday",JSON.stringify(player));
}

// ==========================
// TAP SYSTEM
// ==========================

document.getElementById("tapBtn").onclick=function(){

    tapCounter++;
    if(tapCounter>maxTap){
        player.antiCheat++;
        alert("Cheat detected!");
        return;
    }

    document.getElementById("tapSound").play();

    player.coins+=1;
    player.xp+=1;
    player.missions.tap+=1;

    if(player.xp>=player.level*100){
        player.xp=0;
        player.level++;
        alert("LEVEL UP!");
    }

    if(player.missions.tap>=200){
        player.coins+=200;
        player.missions.tap=0;
        alert("Mission Complete +200!");
    }

    updateUI();
    save();
};

// ==========================
// PRESTIGE
// ==========================

function activatePrestige(){
    if(player.level>=10){
        player.level=1;
        player.prestige++;
        player.coins+=1000;
        alert("Prestige Activated!");
        save();
        updateUI();
    }
}

// ==========================
// SKINS
// ==========================

function buySkin(type){

    if(type==="gold" && player.coins>=500){
        player.coins-=500;
        document.getElementById("tapBtn").style.background="gold";
    }

    if(type==="galaxy" && player.coins>=1000){
        player.coins-=1000;
        document.getElementById("tapBtn").style.background="linear-gradient(45deg,purple,black)";
    }

    updateUI();
    save();
}

// ==========================
// PVP
// ==========================

function startPvP(){

    let opponent=Math.floor(Math.random()*500);

    if(player.coins>opponent){
        player.coins+=300;
        alert("You WON PvP!");
    }else{
        alert("You LOST PvP!");
    }

    updateUI();
    save();
}

// ==========================
// AD REWARD
// ==========================

function watchAd(){
    alert("Watching Ad...");
    setTimeout(()=>{
        player.coins+=200;
        alert("Ad Complete +200!");
        updateUI();
        save();
    },3000);
}

// ==========================
// MUSIC AUTO START
// ==========================

document.body.onclick=function(){
    document.getElementById("bgMusic").play();
};

updateUI();

</script>

</body>
</html>
