<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TapDay Infinity</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:radial-gradient(circle at top,#1e1e2f,#0f0f18);
    color:white;
    text-align:center;
    overflow-x:hidden;
}
h1{margin-top:20px;}
.stats{margin-top:10px;}
#tapBtn{
    width:220px;
    height:220px;
    border-radius:50%;
    border:none;
    font-size:30px;
    color:white;
    background:linear-gradient(45deg,#ff00cc,#3333ff);
    box-shadow:0 0 40px #ff00cc;
    margin-top:40px;
    transition:0.1s;
}
#tapBtn:active{transform:scale(0.9);}
.panel{
    margin-top:30px;
}
button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
.card{
    background:#1a1a2e;
    margin:10px auto;
    padding:15px;
    border-radius:12px;
    width:90%;
    max-width:400px;
}
.leaderboard-entry{
    display:flex;
    justify-content:space-between;
}
.progress{
    width:80%;
    height:10px;
    background:#333;
    margin:10px auto;
    border-radius:5px;
}
.progress-bar{
    height:100%;
    background:linear-gradient(90deg,cyan,purple);
    width:0%;
    border-radius:5px;
}
</style>
</head>
<body>

<h1>🔥 TapDay Infinity 🔥</h1>

<div class="stats">
Coins: <span id="coins">0</span> |
Level: <span id="level">1</span> |
Prestige: <span id="prestige">0</span>
</div>

<button id="tapBtn">TAP</button>

<div class="progress">
<div class="progress-bar" id="xpBar"></div>
</div>

<div class="card">
<h3>🎟 Battle Pass (Season 1)</h3>
XP: <span id="bpXP">0</span> / 100
</div>

<div class="panel">
<button onclick="activatePrestige()">Prestige</button>
<button onclick="buySkin('gold')">Gold Skin</button>
<button onclick="buySkin('galaxy')">Galaxy Skin</button>
<button onclick="watchAd()">Reward Ad</button>
</div>

<div class="card">
<h3>🏆 Leaderboard (Local)</h3>
<div id="leaderboard"></div>
</div>

<audio id="tapSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-click-1114.mp3"></audio>
<audio id="bonusSound" src="https://assets.mixkit.co/sfx/preview/mixkit-bonus-earned-2065.mp3"></audio>
<audio id="bgMusic" src="https://assets.mixkit.co/music/preview/mixkit-arcade-game-opener-222.mp3" loop></audio>

<script>

// ================= DATA =================

let player = JSON.parse(localStorage.getItem("tapdayInfinity")) || {
    coins:0,
    xp:0,
    level:1,
    prestige:0,
    battleXP:0,
    skin:"default"
};

let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

const coinsEl = document.getElementById("coins");
const levelEl = document.getElementById("level");
const prestigeEl = document.getElementById("prestige");
const bpXPEl = document.getElementById("bpXP");
const xpBar = document.getElementById("xpBar");
const tapSound = document.getElementById("tapSound");
const bonusSound = document.getElementById("bonusSound");
const bgMusic = document.getElementById("bgMusic");

document.body.onclick=()=>bgMusic.play();

// ================= TAP =================

document.getElementById("tapBtn").onclick=function(){

    tapSound.play();

    let bonus = Math.random()<0.1 ? 5 : 1;
    player.coins += bonus;
    player.xp += bonus;
    player.battleXP += bonus;

    if(bonus>1){
        bonusSound.play();
    }

    if(player.xp >= player.level*100){
        player.xp = 0;
        player.level++;
        alert("LEVEL UP!");
    }

    if(player.battleXP>=100){
        player.battleXP=0;
        player.coins+=500;
        alert("Battle Pass Reward!");
    }

    updateLeaderboard();
    updateUI();
    save();
};

// ================= PRESTIGE =================

function activatePrestige(){
    if(player.level>=10){
        player.level=1;
        player.prestige++;
        player.coins+=1000;
        alert("Prestige Activated!");
        save();
        updateUI();
    }
}

// ================= SKINS =================

function buySkin(type){
    if(type==="gold" && player.coins>=500){
        player.coins-=500;
        document.getElementById("tapBtn").style.background="gold";
    }
    if(type==="galaxy" && player.coins>=1000){
        player.coins-=1000;
        document.getElementById("tapBtn").style.background="linear-gradient(45deg,purple,black)";
    }
    save();
    updateUI();
}

// ================= AD =================

function watchAd(){
    alert("Watching Ad...");
    setTimeout(()=>{
        player.coins+=200;
        updateUI();
        save();
    },3000);
}

// ================= LEADERBOARD =================

function updateLeaderboard(){
    leaderboard.push({score:player.coins,date:Date.now()});
    leaderboard.sort((a,b)=>b.score-a.score);
    leaderboard=leaderboard.slice(0,5);
    localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
    renderLeaderboard();
}

function renderLeaderboard(){
    document.getElementById("leaderboard").innerHTML=
    leaderboard.map((p,i)=>
    `<div class="leaderboard-entry">
        <span>#${i+1}</span>
        <span>${p.score}</span>
    </div>`).join("");
}

// ================= UI =================

function updateUI(){
    coinsEl.innerText=player.coins;
    levelEl.innerText=player.level;
    prestigeEl.innerText=player.prestige;
    bpXPEl.innerText=player.battleXP;
    xpBar.style.width=(player.xp/(player.level*100))*100+"%";
}

function save(){
    localStorage.setItem("tapdayInfinity",JSON.stringify(player));
}

// INIT
renderLeaderboard();
updateUI();

</script>

</body>
</html>
